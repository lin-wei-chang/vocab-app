<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日文單字複習系統</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 30px;
}

rt {
  font-size: 12px;
  color: #666;
}

ruby {
  font-size: 28px;
  display: inline-block;
}
  
.card {
  width: 320px;
  height: 200px;
  perspective: 1000px;
}
.front {
  flex-direction: column;
  font-size: 28px;
  line-height: 1.6;
  text-align: center;
}
.inner {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.6s;
  position: relative;
}

.flipped { transform: rotateY(180deg); }

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  background: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  backface-visibility: hidden;
}

.back {
  transform: rotateY(180deg);
  background: #dfe6e9;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.remember { background: #00b894; }
.forget { background: #d63031; }
.mode { background: #6c5ce7; }

</style>
</head>

<body>

<h2>🧠 日文單字複習系統</h2>

<div class="card" id="card">
  <div id="cardInner" class="inner">
    <div class="front" id="front"></div>
    <div class="back" id="back"></div>
  </div>
</div>

<div>
  <button class="forget" onclick="mark(false)">不記得</button>
  <button class="remember" onclick="mark(true)">記得</button>
</div>

<div>
  <button class="mode" onclick="toggleFurigana()">假名開關</button>
</div>

<p id="info"></p>

<script>

// ===== 今日進度 =====
let today = new Date().toDateString();

let progress = JSON.parse(localStorage.getItem("progress")) || {
  date: today,
  total: 0,
  correct: 0,
  wrong: 0
};

if (progress.date !== today) {
  progress = { date: today, total: 0, correct: 0, wrong: 0 };
}

// ===== 單字（完整示範版）=====
let words = [

{
  front: "<ruby>続<rt>つづ</rt></ruby>きます",
  back: "繼續（他）"
},
{
  front: "<ruby>続<rt>つづ</rt></ruby>けます",
  back: "繼續（自）"
},
{
  front: "<ruby>見<rt>み</rt></ruby>つけます",
  back: "找到"
}

];

// ===== 控制 =====
let current = 0;
let showFurigana = true;

// ===== 儲存 =====
function save(){
  localStorage.setItem("words",JSON.stringify(words));
  localStorage.setItem("progress",JSON.stringify(progress));
}

// ===== 選題 =====
function pickCard(){
  let now = Date.now();
  let available = words.filter(w=>w.next<=now);
  if(available.length===0){available=words;}
  current = words.indexOf(available[Math.floor(Math.random()*available.length)]);
}

// ===== 去假名 =====
function removeFurigana(text){
  return text.replace(/<rt>.*?<\/rt>/g,"").replace(/<ruby>|<\/ruby>/g,"");
}

// ===== 顯示 =====
function render(){
  let word = words[current].front;
  if(!showFurigana){word = removeFurigana(word);}
  document.getElementById("front").innerHTML = word;
  document.getElementById("back").innerHTML = words[current].back;
  document.getElementById("info").innerText =
    `今日 ${progress.total} 題 ｜✔ ${progress.correct} ❌ ${progress.wrong}`;
}

// ===== 記憶曲線 =====
function getInterval(level){
  return 1000*60*60*24*level;
}

// ===== 作答 =====
function mark(remembered){
  progress.total++;

  if(remembered){
    progress.correct++;
    words[current].level = Math.min(words[current].level+1,5);
    words[current].next = Date.now()+getInterval(words[current].level);
  }else{
    progress.wrong++;
    words[current].level = 1;
    words[current].wrong++;
    words[current].next = Date.now();
  }

  save();
  pickCard();
  render();
}

// ===== 翻卡 =====
document.getElementById("card").onclick = ()=>{
  document.getElementById("cardInner").classList.toggle("flipped");
};

// ===== 假名開關 =====
function toggleFurigana(){
  showFurigana=!showFurigana;
  render();
}

// ===== 啟動 =====
pickCard();
render();

</script>

</body>
</html>
