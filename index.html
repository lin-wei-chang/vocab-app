<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ж—Ҙж–Үе–®еӯ—иӨҮзҝ’зі»зөұ</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 30px;
}

rt {
  font-size: 12px;
  color: #666;
}

ruby {
  font-size: 28px;
  display: inline-block;
}
  
.card {
  width: 320px;
  height: 200px;
  perspective: 1000px;
}
.front {
  flex-direction: column;
  font-size: 26px;
  line-height: 1.6;
  text-align: center;
}
.inner {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.6s;
  position: relative;
}

.flipped { transform: rotateY(180deg); }

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  background: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  backface-visibility: hidden;
}

.back {
  transform: rotateY(180deg);
  background: #dfe6e9;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.remember { background: #00b894; }
.forget { background: #d63031; }
.mode { background: #6c5ce7; }

</style>
</head>

<body>

<h2>рҹ§  ж—Ҙж–Үе–®еӯ—иӨҮзҝ’зі»зөұ</h2>

<div class="card" id="card">
  <div id="cardInner" class="inner">
    <div class="front" id="front"></div>
    <div class="back" id="back"></div>
  </div>
</div>

<div>
  <button class="forget" onclick="mark(false)">дёҚиЁҳеҫ—</button>
  <button class="remember" onclick="mark(true)">иЁҳеҫ—</button>
</div>

<div>
  <button class="mode" onclick="toggleFurigana()">еҒҮеҗҚй–Ӣй—ң</button>
</div>

<p id="info"></p>

<script>

// ===== д»Ҡж—ҘйҖІеәҰ =====
let today = new Date().toDateString();

let progress = JSON.parse(localStorage.getItem("progress")) || {
  date: today,
  total: 0,
  correct: 0,
  wrong: 0
};

if (progress.date !== today) {
  progress = { date: today, total: 0, correct: 0, wrong: 0 };
}

// ===== е–®еӯ—пјҲе®Ңж•ҙзӨәзҜ„зүҲпјү=====
let words = [

{
  front: "гҒӨгҒҘгҒҚгҒҫгҒҷ<br>з¶ҡгҒҚгҒҫгҒҷ",
  back: "з№јзәҢпјҲд»–пјү",
  level:1,next:Date.now(),wrong:0
},
{
  front: "гҒӨгҒҘгҒ‘гҒҫгҒҷ<br>з¶ҡгҒ‘гҒҫгҒҷ",
  back: "з№јзәҢпјҲиҮӘпјү",
  level:1,next:Date.now(),wrong:0
},
{
  front: "гҒҝгҒӨгҒ‘гҒҫгҒҷ<br>иҰӢгҒӨгҒ‘гҒҫгҒҷ",
  back: "жүҫеҲ°",
  level:1,next:Date.now(),wrong:0
},
{
  front: "гҒ•гҒҢгҒ—гҒҫгҒҷ<br>жҺўгҒ—гҒҫгҒҷ",
  back: "е°Ӣжүҫ",
  level:1,next:Date.now(),wrong:0
}

];

// ===== жҺ§еҲ¶ =====
let current = 0;
let showFurigana = true;

// ===== е„Іеӯҳ =====
function save(){
  localStorage.setItem("words",JSON.stringify(words));
  localStorage.setItem("progress",JSON.stringify(progress));
}

// ===== йҒёйЎҢ =====
function pickCard(){
  let now = Date.now();
  let available = words.filter(w=>w.next<=now);
  if(available.length===0){available=words;}
  current = words.indexOf(available[Math.floor(Math.random()*available.length)]);
}

// ===== еҺ»еҒҮеҗҚ =====
function removeFurigana(text){
  return text.replace(/<rt>.*?<\/rt>/g,"").replace(/<ruby>|<\/ruby>/g,"");
}

// ===== йЎҜзӨә =====
function render(){
  let word = words[current].front;
  if(!showFurigana){word = removeFurigana(word);}
  document.getElementById("front").innerHTML = word;
  document.getElementById("back").innerHTML = words[current].back;
  document.getElementById("info").innerText =
    `д»Ҡж—Ҙ ${progress.total} йЎҢ пҪңвң” ${progress.correct} вқҢ ${progress.wrong}`;
}

// ===== иЁҳжҶ¶жӣІз·ҡ =====
function getInterval(level){
  return 1000*60*60*24*level;
}

// ===== дҪңзӯ” =====
function mark(remembered){
  progress.total++;

  if(remembered){
    progress.correct++;
    words[current].level = Math.min(words[current].level+1,5);
    words[current].next = Date.now()+getInterval(words[current].level);
  }else{
    progress.wrong++;
    words[current].level = 1;
    words[current].wrong++;
    words[current].next = Date.now();
  }

  save();
  pickCard();
  render();
}

// ===== зҝ»еҚЎ =====
document.getElementById("card").onclick = ()=>{
  document.getElementById("cardInner").classList.toggle("flipped");
};

// ===== еҒҮеҗҚй–Ӣй—ң =====
function toggleFurigana(){
  showFurigana=!showFurigana;
  render();
}

// ===== е•ҹеӢ• =====
pickCard();
render();

</script>

</body>
</html>
